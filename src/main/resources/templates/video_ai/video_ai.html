<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video AI</title>
    <link rel="stylesheet" href="../../static/css/video_ai/video_ai.css">
    <script src="../../static/js/video_ai/event.js"></script>
</head>
<body>

<div class="vai-container" id="vaiContainer">

    <!-- FAB 버튼 -->
    <div class="vai-fab" id="vaiFab">
        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" width="28" height="28">
            <path d="M20.9277 11.9385C20.9276 7.33919 16.9819 3.52051 12.0009 3.52051C7.0201 3.52073 3.07523 7.33932 3.07513 11.9385V11.9541L3.07416 11.9688C3.05406 12.6536 3.16773 13.2252 3.33197 13.7822C3.41646 14.0687 3.5114 14.3424 3.6142 14.6436C3.71404 14.936 3.82074 15.2538 3.90912 15.585C4.09044 16.2645 4.19971 17.0211 4.0683 17.9131C3.98022 18.5107 3.78609 19.1377 3.46869 19.8203C4.76942 20.2088 6.09062 19.8768 7.59467 19.207L8.06049 19L8.50482 19.2471C9.60171 19.8559 10.4728 20.3554 12.0009 20.3555C16.982 20.3555 20.9275 16.5376 20.9277 11.9385ZM22.9687 11.9385C22.9685 17.7643 18.0066 22.3965 12.0009 22.3965C10.1701 22.3964 8.96548 21.8273 7.95013 21.2725C6.02559 22.0608 3.82847 22.5044 1.54779 21.1982L0.645447 20.6816L1.17865 19.7891C1.73294 18.8616 1.96855 18.1664 2.04974 17.6152C2.12947 17.074 2.06993 16.6079 1.93744 16.1113C1.86892 15.8545 1.78259 15.5957 1.68256 15.3027C1.58545 15.0183 1.47352 14.697 1.37396 14.3594C1.17016 13.6682 1.00578 12.8728 1.03412 11.9082H1.0351C1.05234 6.09675 6.00561 1.47972 12.0009 1.47949C18.0068 1.47949 22.9686 6.11265 22.9687 11.9385Z"></path>
        </svg>
    </div>

    <!-- 메인 드롭다운 패널 -->
    <div class="vai-dropdown" id="vaiDropdown">

        <!-- 회의 목록 토글 버튼 -->
        <div class="vai-menu-item" id="vaiMeetingToggle">
            <div class="vai-menu-item-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h2v7H7zm4-3h2v10h-2zm4 6h2v4h-2z"></path>
                </svg>
            </div>
            <span class="vai-menu-item-label">회의 목록</span>
            <div class="vai-menu-item-chevron" id="vaiMeetingChevron">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                    <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"></path>
                </svg>
            </div>
        </div>

        <!-- 회의 목록 (아코디언) -->
        <div class="vai-accordion" id="vaiMeetingList">
            <!-- JS로 렌더링 -->
        </div>
    </div>

    <!-- 오디오 플레이어 패널 -->
    <div class="vai-panel" id="vaiAudioPanel">
        <div class="vai-panel-header">
            <button class="vai-back-btn" id="vaiAudioBack">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"></path>
                </svg>
            </button>
            <span class="vai-panel-title" id="vaiAudioTitle">오디오 재생</span>
            <button class="vai-panel-close" id="vaiAudioClose">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"></path>
                </svg>
            </button>
        </div>
        <div class="vai-panel-body">
            <audio id="vaiAudioPlayer" controls></audio>
        </div>
    </div>

    <!-- 요약본 패널 -->
    <div class="vai-panel" id="vaiSummaryPanel">
        <div class="vai-panel-header">
            <button class="vai-back-btn" id="vaiSummaryBack">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"></path>
                </svg>
            </button>
            <span class="vai-panel-title">요약본</span>
            <button class="vai-panel-close" id="vaiSummaryClose">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"></path>
                </svg>
            </button>
        </div>
        <div class="vai-panel-body vai-summary-body">
            <h3 class="vai-summary-title" id="vaiSummaryTitle"></h3>
            <div class="vai-summary-text" id="vaiSummaryText"></div>
        </div>
    </div>

    <!-- AI 채팅 패널 -->
    <div class="vai-panel vai-chat-panel" id="vaiChatPanel">
        <div class="vai-panel-header">
            <button class="vai-back-btn" id="vaiChatBack">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"></path>
                </svg>
            </button>
            <span class="vai-panel-title" id="vaiChatTitle">AI에게 질문</span>
            <button class="vai-panel-close" id="vaiChatClose">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"></path>
                </svg>
            </button>
        </div>
        <div class="vai-chat-messages" id="vaiChatMessages">
            <div class="vai-chat-empty">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="rgb(139,152,165)">
                    <path d="M20.9277 11.9385C20.9276 7.33919 16.9819 3.52051 12.0009 3.52051C7.0201 3.52073 3.07523 7.33932 3.07513 11.9385V11.9541L3.07416 11.9688C3.05406 12.6536 3.16773 13.2252 3.33197 13.7822C3.41646 14.0687 3.5114 14.3424 3.6142 14.6436C3.71404 14.936 3.82074 15.2538 3.90912 15.585C4.09044 16.2645 4.19971 17.0211 4.0683 17.9131C3.98022 18.5107 3.78609 19.1377 3.46869 19.8203C4.76942 20.2088 6.09062 19.8768 7.59467 19.207L8.06049 19L8.50482 19.2471C9.60171 19.8559 10.4728 20.3554 12.0009 20.3555C16.982 20.3555 20.9275 16.5376 20.9277 11.9385Z"></path>
                </svg>
                <span>이 녹음에 대해 질문해보세요</span>
            </div>
        </div>
        <div class="vai-chat-input-area">
            <div class="vai-chat-input-box">
                <textarea class="vai-chat-textarea" placeholder="무엇이든 물어보세요" rows="1"></textarea>
                <button class="vai-chat-send-btn" id="vaiChatSend">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

</div>

</body>
</html>
