<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 비밀번호 모달</title>
    <link rel="stylesheet" href="../../static/css/member/login-password-modal.css">
</head>
<body>
    <div class="login-overlay" aria-hidden="false">
        <section class="login-modal" role="dialog" aria-modal="true" aria-labelledby="loginPasswordTitle">
            <button type="button" class="login-close" aria-label="닫기">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"></path>
                </svg>
            </button>

            <div class="login-logo" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                    <path d="M21.742 21.75l-7.563-11.179 7.056-8.321h-2.456l-5.691 6.714-4.54-6.714H2.359l7.29 10.776L2.25 21.75h2.456l6.035-7.118 4.818 7.118h6.191-.008zM7.739 3.818L18.81 20.182h-2.447L5.29 3.818h2.447z"></path>
                </svg>
            </div>

            <div class="login-inner">
                <h1 id="loginPasswordTitle" class="login-title">비밀번호를 입력하세요</h1>

                <div class="mail-box">
                    <span class="mail-label">이메일</span>
                    <strong class="mail-value">dhkdch6356@gmail.com</strong>
                </div>

                <label class="password-wrap" for="passwordInput">
                    <span class="password-label">비밀번호</span>
                    <input id="passwordInput" type="password" autocomplete="current-password">
                    <button type="button" class="eye-btn" aria-label="비밀번호 보기">
                        <svg class="eye-open" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path>
                            <circle cx="12" cy="12" r="3.2"></circle>
                        </svg>
                        <svg class="eye-off is-hidden" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path>
                            <circle cx="12" cy="12" r="3.2"></circle>
                            <line x1="4" y1="20" x2="20" y2="4"></line>
                        </svg>
                    </button>
                </label>

                <a href="#" class="find-password">비밀번호 찾기</a>

                <button type="button" class="btn-login" id="loginBtn" disabled>로그인하기</button>

                <p class="signup-text">계정이 없으신가요? <a href="#">가입하기</a></p>
            </div>
        </section>
    </div>

    <script src="../../static/js/member/login-password-modal.js"></script>
</body>
</html>
