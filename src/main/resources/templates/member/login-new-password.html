<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>새 비밀번호 선택</title>
  <link rel="stylesheet" href="/static/css/member/login-new-password.css" />
</head>
<body>
  <main class="np-page">
    <section class="np-overlay" id="npOverlay" aria-hidden="false">
      <article class="np-modal" role="dialog" aria-modal="true" aria-labelledby="npTitle">
        <header class="np-header">
          <button class="np-close" id="npClose" type="button" aria-label="닫기">×</button>
          <div class="np-logo" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M18.901 1.153h3.68l-8.04 9.19 9.46 12.504H16.594l-5.8-7.584-6.99 7.584H.12l8.6-9.32L-.001 1.153h7.598l5.243 6.932L18.901 1.153Zm-1.29 19.468h2.04L6.486 3.264H4.298l13.313 17.357Z"></path></svg>
          </div>
          <span></span>
        </header>

        <section class="np-content">
          <h1 class="np-title" id="npTitle">새 비밀번호 선택</h1>
          <p class="np-desc">
            새 비밀번호는 8자 이상(영문 기준)이어야 합니다. <a href="#" class="np-link">안전한 비밀번호</a>를 위해 숫자, 문자, 특수문자를 사용해 보세요.
          </p>
          <p class="np-desc np-desc-gap">비밀번호를 변경한 후에는 모든 활성 X 세션에서 로그아웃됩니다.</p>

          <label class="np-field" id="newPwWrap">
            <span class="np-label">새 비밀번호를 입력하세요</span>
            <input id="newPw" class="np-input" type="password" autocomplete="new-password" />
            <button id="toggleNewPw" class="np-eye" type="button" aria-label="비밀번호 보기">
              <svg class="eye-open" viewBox="0 0 24 24"><path d="M1.5 12S5.5 4.5 12 4.5 22.5 12 22.5 12 18.5 19.5 12 19.5 1.5 12 1.5 12Z"></path><circle cx="12" cy="12" r="3.4"></circle></svg>
              <svg class="eye-off" viewBox="0 0 24 24"><path d="M1.5 12S5.5 4.5 12 4.5 22.5 12 22.5 12 18.5 19.5 12 19.5 1.5 12 1.5 12Z"></path><circle cx="12" cy="12" r="3.4"></circle><path d="M3 21 21 3"></path></svg>
            </button>
          </label>

          <label class="np-field" id="confirmPwWrap">
            <span class="np-label">비밀번호를 확인해 주세요</span>
            <input id="confirmPw" class="np-input" type="password" autocomplete="new-password" />
            <button id="toggleConfirmPw" class="np-eye" type="button" aria-label="확인 비밀번호 보기">
              <svg class="eye-open" viewBox="0 0 24 24"><path d="M1.5 12S5.5 4.5 12 4.5 22.5 12 22.5 12 18.5 19.5 12 19.5 1.5 12 1.5 12Z"></path><circle cx="12" cy="12" r="3.4"></circle></svg>
              <svg class="eye-off" viewBox="0 0 24 24"><path d="M1.5 12S5.5 4.5 12 4.5 22.5 12 22.5 12 18.5 19.5 12 19.5 1.5 12 1.5 12Z"></path><circle cx="12" cy="12" r="3.4"></circle><path d="M3 21 21 3"></path></svg>
            </button>
          </label>
        </section>

        <footer class="np-footer">
          <button id="npSubmit" class="np-submit is-disabled" type="button" disabled>비밀번호를 변경하세요</button>
        </footer>
      </article>
    </section>
  </main>

  <script src="/static/js/member/login-new-password.js"></script>
</body>
</html>
