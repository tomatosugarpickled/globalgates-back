<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계정 찾기 모달</title>
    <link rel="stylesheet" href="../../static/css/member/login-account-modal.css">
</head>
<body>
    <div class="account-overlay" aria-hidden="false">
        <section class="account-modal" role="dialog" aria-modal="true" aria-labelledby="accountTitle">
            <button type="button" class="account-close" aria-label="닫기">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"></path>
                </svg>
            </button>

            <div class="account-logo" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                    <path d="M21.742 21.75l-7.563-11.179 7.056-8.321h-2.456l-5.691 6.714-4.54-6.714H2.359l7.29 10.776L2.25 21.75h2.456l6.035-7.118 4.818 7.118h6.191-.008zM7.739 3.818L18.81 20.182h-2.447L5.29 3.818h2.447z"></path>
                </svg>
            </div>

            <div class="account-inner">
                <h1 id="accountTitle" class="account-title">내 X 계정 찾기</h1>
                <p class="account-desc">비밀번호를 변경하려면 계정에 연결된 이메일 또는 전화번호를 입력해 주세요.</p>

                <label class="account-input-wrap" for="accountIdentity">
                    <span class="account-label">이메일 또는 전화번호</span>
                    <input id="accountIdentity" type="text" value="dhkdch6356@gmail.com" autocomplete="username">
                </label>

                <button type="button" class="account-next" id="accountNextBtn">다음</button>
            </div>
        </section>
    </div>

    <script src="../../static/js/member/login-account-modal.js"></script>
</body>
</html>
