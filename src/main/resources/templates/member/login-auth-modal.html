<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인증 모달</title>
    <link rel="stylesheet" href="../../static/css/member/login-auth-modal.css">
</head>
<body>
<div class="auth-overlay" aria-hidden="false">
    <section class="auth-modal" role="dialog" aria-modal="true" aria-labelledby="authTitle">
        <button type="button" class="auth-close" aria-label="닫기">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"></path>
            </svg>
        </button>

        <div class="auth-logo" aria-hidden="true">
            <svg viewBox="0 0 24 24">
                <path d="M21.742 21.75l-7.563-11.179 7.056-8.321h-2.456l-5.691 6.714-4.54-6.714H2.359l7.29 10.776L2.25 21.75h2.456l6.035-7.118 4.818 7.118h6.191-.008zM7.739 3.818L18.81 20.182h-2.447L5.29 3.818h2.447z"></path>
            </svg>
        </div>

        <div class="auth-inner">
            <h1 id="authTitle" class="auth-title">어떤 방법으로 인증 코드를 받으시겠어요?</h1>

            <p class="auth-desc">비밀번호를 변경하기 전에 본인임을 인증을 해야 합니다.</p>
            <p class="auth-desc second">먼저 인증 코드를 받을 기기를 선택해 주세요.</p>

            <button type="button" class="auth-method selected" id="emailMethod">
                <span class="method-text">dh******@g******로 이메일 보내기</span>
                <span class="check-circle" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><path
                                d="M9.55 17.4L4.7 12.55l1.4-1.4 3.45 3.45 8.35-8.35 1.4 1.4z"></path></svg>
                    </span>
            </button>

            <p class="support-text">액세스 권한이 없는 경우 <a href="#">X 고객지원팀</a>에 문의해 주세요.</p>

            <div class="auth-actions">
                <button type="button" class="btn-next" id="authNextBtn">다음</button>
                <button type="button" class="btn-cancel" id="authCancelBtn">취소</button>
            </div>
        </div>
    </section>
</div>

<script src="../../static/js/member/login-auth-modal.js"></script>
</body>
</html>
