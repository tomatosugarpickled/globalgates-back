<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Friends / X</title>
    <link rel="stylesheet" href="/css/Friends/Friends.css"/>
    <script src="/js/Friends/service.js"></script>
    <script src="/js/Friends/layout.js"></script>
    <script src="/js/Friends/event.js"></script>
</head>
<body>
<div class="app-layout">
    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <div class="main-header">
            <button class="header-back" id="headerBack">
                <svg viewBox="0 0 24 24" class="header-back-icon">
                    <path
                            d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"
                    />
                </svg>
            </button>
            <h1 class="header-title">친구</h1>
            <div class="header-spacer"></div>
            <button class="header-settings">
                <svg
                        viewBox="0 0 24 24"
                        width="20"
                        height="20"
                        stroke="currentColor"
                        fill="none"
                        stroke-width="2"
                        class="header-settings-icon"
                >
                    <circle cx="12" cy="12" r="3"/>
                    <path
                            d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
                    />
                </svg>
            </button>
        </div>

        <!-- Category Banner -->
        <div class="category-banner">
            <p class="category-banner-title">카테고리 태그란</p>
            <div class="category-scroll-wrap">
                <button
                        class="category-scroll-arrow category-scroll-left"
                        id="scrollLeft"
                        style="display: none"
                >
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path
                                d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"
                                fill="currentColor"
                        />
                    </svg>
                </button>
                <!-- 카테고리 칩 (서버에서 동적 로드) -->
                <div class="category-scroll" id="categoryScroll"></div>
                <button
                        class="category-scroll-arrow category-scroll-right"
                        id="scrollRight"
                        style="display: none"
                >
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path
                                d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"
                                fill="currentColor"
                        />
                    </svg>
                </button>
            </div>
        </div>

        <!-- 친구 추천 리스트 (서버에서 동적 로드) -->
        <div id="friendsList"></div>

        <div class="bottom-spacer"></div>
    </main>
</div>

<!-- 연결 해제 확인 모달 -->
<div class="modal-overlay" id="disconnectModal">
    <div
            class="modal-dialog"
            role="alertdialog"
            aria-labelledby="modalTitle"
    >
        <h1 class="modal-title" id="modalTitle">
            연결을 끊으시겠습니까?
        </h1>
        <p class="modal-desc">
            이 사용자의 게시물은 더 이상 팔로잉 타임라인에 표시되지
            않습니다. 이 사용자의 프로필은 게시물이 비공개로 설정되지
            않는 한 계속 볼 수 있습니다.
        </p>
        <div class="modal-actions">
            <button class="modal-btn-confirm" id="modalConfirm">
                연결 끊기
            </button>
            <button class="modal-btn-cancel" id="modalCancel">
                취소
            </button>
        </div>
    </div>
</div>

</body>
</html>
