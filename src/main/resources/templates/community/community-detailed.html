<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[글반투] 글로벌 반도체 투자 커뮤니티 / X</title>
  <link rel="stylesheet" href="/css/community/community-detailed.css" />
  <script src="https://cdn.jsdelivr.net/npm/@joeattardi/emoji-button@3.0.3/dist/index.min.js"></script>
  <script src="/js/community/service.js"></script>
  <script src="/js/community/community-detailed-service.js"></script>
  <script src="/js/community/community-detailed-layout.js"></script>
  <script src="/js/community/community-detailed-event.js"></script>
</head>
<body>

<div class="app-container">

  <!-- 메인 콘텐츠 -->
  <main class="main-content communityDetailPage" th:data-community-id="${communityId}" th:data-member-id="${memberId}">

    <!-- 검색 오버레이 -->
    <div id="searchOverlay" class="search-overlay">
      <div class="search-input-wrap">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="#536471"><path d="M10.25 3.75c-3.59 0-6.5 2.91-6.5 6.5s2.91 6.5 6.5 6.5c1.795 0 3.419-.726 4.596-1.904 1.178-1.177 1.904-2.801 1.904-4.596 0-3.59-2.91-6.5-6.5-6.5zm-8.5 6.5c0-4.694 3.806-8.5 8.5-8.5s8.5 3.806 8.5 8.5c0 1.986-.682 3.815-1.814 5.262l4.526 4.526-1.414 1.414-4.526-4.526C13.815 19.568 11.986 20.25 10.25 20.25c-4.694 0-8.5-3.806-8.5-8.5z"/></svg>
        <input type="text" placeholder="이 커뮤니티 검색하기" />
        <button onclick="toggleSearch()" style="color:#536471;font-size:14px;">닫기</button>
      </div>
    </div>

    <!-- 상단 헤더 -->
    <header class="community-header">
      <div class="header-top">
        <button class="back-btn" onclick="history.back()" title="돌아가기">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"/>
          </svg>
        </button>
        <span class="header-title">[글반투] 글로벌 반도체 투자 커뮤니티</span>
      </div>
    </header>

    <!-- 상세 헤더 (JS가 동적 렌더링) -->
    <section class="communityDetailHeader">
        <!-- CommunityDetailLayout.renderHeader() -->
    </section>
    <!-- 탭 네비게이션 (원본과 동일) -->
    <nav class="tab-nav">
        <button class="tab-btn active" data-tab="popular">인기</button>
        <button class="tab-btn" data-tab="latest">최신</button>
        <button class="tab-btn" data-tab="media">미디어</button>
        <button class="tab-btn" data-tab="about">소개</button>
    </nav>

    <!-- 인기 탭 -->
    <div id="tab-popular" class="tab-content active">
        <section class="communityDetailFeed" data-feed="popular">
        </section>
    </div>

    <!-- 최신 탭 -->
    <div id="tab-latest" class="tab-content hidden">
        <section class="communityDetailFeed" data-feed="latest">
        </section>
    </div>

    <!-- 미디어 탭 -->
    <div id="tab-media" class="tab-content hidden">
        <section class="communityDetailMedia">
        </section>
    </div>

    <!-- 소개 탭 -->
    <div id="tab-about" class="tab-content hidden">
        <section class="communityDetailAbout">
            <div class="aboutSection" id="communityAboutContent">
            </div>
        </section>
    </div>

    <!-- 이미지 확대 오버레이 -->
    <div class="Post-Media-Preview-Overlay off" id="postMediaPreviewOverlay">
        <div class="Post-Media-Preview-Dialog">
            <img class="Post-Media-Preview-Image" id="postMediaPreviewImage" src="" alt="">
            <button class="Post-Media-Preview-Close" id="postMediaPreviewClose" aria-label="닫기">
                <svg viewBox="0 0 24 24"><path d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"></path></svg>
            </button>
        </div>
    </div>

  </main>
</div>

<!-- 오버레이 (헤더 드롭다운용) -->
<div id="overlay" class="overlay hidden" onclick="closeAllDropdowns()"></div>

<!-- 동적 드롭다운 마운트 지점 -->
<div id="layers" aria-hidden="true"></div>

<!-- FAB: 새 게시물 작성 -->
<button type="button" class="communityFab" aria-label="게시물 작성" data-compose>
  <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
    <path d="M19.828 4.172a2.86 2.86 0 0 0-4.042 0L4.172 15.786 3 21l5.214-1.172L19.828 8.214a2.86 2.86 0 0 0 0-4.042zm-13.2 14.4-2.4.54.54-2.4 9.6-9.6 1.86 1.86-9.6 9.6zm11.04-11.04-1.86-1.86.84-.84a.86.86 0 0 1 1.218 0l.642.642a.86.86 0 0 1 0 1.218l-.84.84z"></path>
  </svg>
</button>

<!-- 답글 모달 -->
<div class="tweet-modal-overlay" data-reply-modal hidden>
  <div class="tweet-modal" role="dialog" aria-modal="true" aria-labelledby="reply-modal-title">
    <div class="tweet-modal__compose-view">
      <div class="tweet-modal__header">
        <button type="button" class="tweet-modal__close" aria-label="닫기" data-testid="app-bar-close">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><g><path d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"></path></g></svg>
        </button>
        <h2 id="reply-modal-title" class="tweet-modal__title">답글</h2>
        <button type="button" class="tweet-modal__draft" data-testid="unsentButton">임시저장</button>
      </div>
      <div class="tweet-modal__body">
        <p class="tweet-modal__context-button"></p>
        <article class="tweet-modal__source-tweet" data-testid="tweet">
          <img src="" alt="" class="tweet-modal__source-avatar" />
          <div class="tweet-modal__source-body">
            <div class="tweet-modal__source-meta">
              <span class="tweet-modal__source-name"></span>
              <span class="tweet-modal__source-handle"></span>
              <span class="tweet-sep" aria-hidden="true">·</span>
              <span class="tweet-modal__source-time"></span>
            </div>
            <p class="tweet-modal__source-text"></p>
          </div>
        </article>
        <div class="tweet-modal__composer">
          <img src="" alt="" class="tweet-modal__avatar-image" />
          <div class="tweet-modal__input-wrap">
            <div class="tweet-modal__editor" contenteditable="true" role="textbox" aria-label="게시물 작성" aria-multiline="true" tabindex="0" data-testid="tweetTextarea_0" data-placeholder="답글 게시하기"></div>
            <div class="tweet-modal__attachment attachments" data-attachment-preview data-testid="attachments" hidden>
              <div class="tweet-modal__attachment-media media-grid-wrapper" data-attachment-media></div>
              <div class="tweet-modal__attachment-meta media-actions-bar">
                <button type="button" class="tweet-modal__attachment-meta-btn media-action-link" data-user-tag-trigger>
                  <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><g><path d="M5.651 19h12.698c-.337-1.8-1.023-3.21-1.945-4.19C15.318 13.65 13.838 13 12 13s-3.317.65-4.404 1.81c-.922.98-1.608 2.39-1.945 4.19zm.486-5.56C7.627 11.85 9.648 11 12 11s4.373.85 5.863 2.44c1.477 1.58 2.366 3.8 2.632 6.46l.11 1.1H3.395l.11-1.1c.266-2.66 1.155-4.88 2.632-6.46zM12 4c-1.105 0-2 .9-2 2s.895 2 2 2 2-.9 2-2-.895-2-2-2zM8 6c0-2.21 1.791-4 4-4s4 1.79 4 4-1.791 4-4 4-4-1.79-4-4z"></path></g></svg>
                  <span data-user-tag-label>사용자 태그하기</span>
                </button>
                <button type="button" class="tweet-modal__attachment-meta-btn media-action-link" data-media-alt-trigger>
                  <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><g><path d="M3 4.5C3 3.12 4.12 2 5.5 2h13C19.88 2 21 3.12 21 4.5v15c0 1.38-1.12 2.5-2.5 2.5h-13C4.12 22 3 20.88 3 19.5v-15zM5.5 4c-.28 0-.5.22-.5.5v15c0 .28.22.5.5.5h13c.28 0 .5-.22.5-.5v-15c0-.28-.22-.5-.5-.5h-13zM16 10H8V8h8v2zm-8 2h8v2H8v-2z"></path></g></svg>
                  <span data-media-alt-label>설명 추가</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="tweet-modal__footer">
        <div class="tweet-modal__footer-meta" hidden>
          <div class="tweet-modal__footer-meta-slot tweet-modal__footer-meta-slot--end">
            <button type="button" class="tweet-modal__location-display" data-location-display hidden>
              <div dir="ltr" class="tweet-modal__location-display-inner">
                <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" class="tweet-modal__location-display-icon"><g><path d="M12 2c-4.687 0-8.5 3.813-8.5 8.5 0 5.967 7.621 11.116 7.945 11.332l.555.37.555-.37c.324-.216 7.945-5.365 7.945-11.332C20.5 5.813 16.687 2 12 2zm0 11.5c-1.65 0-3-1.34-3-3s1.35-3 3-3c1.66 0 3 1.34 3 3s-1.34 3-3 3z"></path></g></svg>
                <div class="tweet-modal__location-display-text-wrap"><span class="tweet-modal__location-display-text-outer"><span class="tweet-modal__location-display-text-inner" data-location-name></span></span></div>
              </div>
            </button>
          </div>
        </div>
        <div class="tweet-modal__footer-bottom">
          <div class="tweet-modal__toolbar" data-testid="toolBar">
            <div class="tweet-modal__tool-file">
              <button type="button" class="tweet-modal__tool-btn" aria-label="사진 또는 동영상 추가" data-testid="mediaUploadButton">
                <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><g><path d="M3 5.5C3 4.119 4.119 3 5.5 3h13C19.881 3 21 4.119 21 5.5v13c0 1.381-1.119 2.5-2.5 2.5h-13C4.119 21 3 19.881 3 18.5v-13zM5.5 5c-.276 0-.5.224-.5.5v9.086l3-3 3 3 5-5 3 3V5.5c0-.276-.224-.5-.5-.5h-13zM19 15.414l-3-3-5 5-3-3-3 3V18.5c0 .276.224.5.5.5h13c.276 0 .5-.224.5-.5v-3.086zM9.75 7C8.784 7 8 7.784 8 8.75s.784 1.75 1.75 1.75 1.75-.784 1.75-1.75S10.716 7 9.75 7z"></path></g></svg>
              </button>
              <input type="file" data-testid="fileInput" accept="image/jpeg,image/png,image/webp,image/gif,video/mp4,video/quicktime" multiple tabindex="-1" class="tweet-modal__file-input" />
            </div>
            <button type="button" class="tweet-modal__tool-btn" aria-label="판매글 선택" data-testid="productSelectButton">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><g><path d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5S3.5 15.135 3.5 11z"></path></g><g><path d="M7 9h10v1.5H7zm0 3h7v1.5H7z"></path></g></svg>
            </button>
            <button type="button" class="tweet-modal__tool-btn" aria-label="이모티콘 추가하기" data-testid="emojiButton" aria-expanded="false" aria-haspopup="menu">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><g><path d="M12 22.75C6.072 22.75 1.25 17.928 1.25 12S6.072 1.25 12 1.25 22.75 6.072 22.75 12 17.928 22.75 12 22.75zm0-20c-5.109 0-9.25 4.141-9.25 9.25s4.141 9.25 9.25 9.25 9.25-4.141 9.25-9.25S17.109 2.75 12 2.75zM9 11.75c-.69 0-1.25-.56-1.25-1.25s.56-1.25 1.25-1.25 1.25.56 1.25 1.25-.56 1.25-1.25 1.25zm6 0c-.69 0-1.25-.56-1.25-1.25s.56-1.25 1.25-1.25 1.25.56 1.25 1.25-.56 1.25-1.25 1.25zm-8.071 3.971c.307-.298.771-.397 1.188-.253C9.07 16.154 10.52 16.75 12 16.75s2.93-.596 3.883-.982c.417-.144.88-.044 1.188.253a.846.846 0 01-.149 1.34c-1.254.715-3.059 1.139-4.922 1.139s-3.668-.424-4.922-1.139a.847.847 0 01-.149-1.39z"></path></g></svg>
            </button>
            <button type="button" class="tweet-modal__tool-btn tweet-modal__tool-btn--geo" aria-label="위치 태그하기" data-testid="geoButton">
              <div dir="ltr" class="tweet-modal__tool-btn-inner">
                <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" class="tweet-modal__tool-btn-icon tweet-modal__tool-btn-icon--geo"><g><path d="M12 7c-1.93 0-3.5 1.57-3.5 3.5S10.07 14 12 14s3.5-1.57 3.5-3.5S13.93 7 12 7zm0 5c-.827 0-1.5-.673-1.5-1.5S11.173 9 12 9s1.5.673 1.5 1.5S12.827 12 12 12zm0-10c-4.687 0-8.5 3.813-8.5 8.5 0 5.967 7.621 11.116 7.945 11.332l.555.37.555-.37c.324-.216 7.945-5.365 7.945-11.332C20.5 5.813 16.687 2 12 2zm0 17.77c-1.665-1.241-6.5-5.196-6.5-9.27C5.5 6.916 8.416 4 12 4s6.5 2.916 6.5 6.5c0 4.073-4.835 8.028-6.5 9.27z" data-path-inactive="M12 7c-1.93 0-3.5 1.57-3.5 3.5S10.07 14 12 14s3.5-1.57 3.5-3.5S13.93 7 12 7zm0 5c-.827 0-1.5-.673-1.5-1.5S11.173 9 12 9s1.5.673 1.5 1.5S12.827 12 12 12zm0-10c-4.687 0-8.5 3.813-8.5 8.5 0 5.967 7.621 11.116 7.945 11.332l.555.37.555-.37c.324-.216 7.945-5.365 7.945-11.332C20.5 5.813 16.687 2 12 2zm0 17.77c-1.665-1.241-6.5-5.196-6.5-9.27C5.5 6.916 8.416 4 12 4s6.5 2.916 6.5 6.5c0 4.073-4.835 8.028-6.5 9.27z" data-path-active="M12 2c-4.687 0-8.5 3.813-8.5 8.5 0 5.967 7.621 11.116 7.945 11.332l.555.37.555-.37c.324-.216 7.945-5.365 7.945-11.332C20.5 5.813 16.687 2 12 2zm0 11.5c-1.65 0-3-1.34-3-3s1.35-3 3-3c1.66 0 3 1.34 3 3s-1.34 3-3 3z"></path></g></svg>
                <div class="tweet-modal__tool-btn-text-wrap"><span class="tweet-modal__tool-btn-text"></span></div>
              </div>
            </button>
            <button type="button" class="tweet-modal__tool-btn tweet-modal__tool-btn--format" aria-label="굵게, (CTRL+B) 님" data-format="bold">
              <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" class="tweet-modal__tool-format-icon"><g><path d="M15.636 11.671c2.079-.583 3.093-2.18 3.093-3.929 0-2.307-1.471-4.741-5.983-4.741H5.623V21h7.579c4.411 0 6.008-2.484 6.008-4.994 0-2.383-1.343-3.955-3.574-4.335zm-3.295-6.287c2.535 0 3.27 1.319 3.27 2.662 0 1.242-.583 2.611-3.27 2.611H8.69V5.384h3.651zM8.69 18.617v-5.628h4.208c2.231 0 3.194 1.166 3.194 2.738 0 1.547-.887 2.89-3.397 2.89H8.69z"></path></g></svg>
            </button>
            <button type="button" class="tweet-modal__tool-btn tweet-modal__tool-btn--format" aria-label="기울임꼴, (CTRL+I) 님" data-format="italic">
              <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" class="tweet-modal__tool-format-icon"><g><path d="M9 6h3.731L9.184 18H5v2h10v-2h-3.731l3.547-12H19V4H9v2z"></path></g></svg>
            </button>
          </div>
          <div class="tweet-modal__emoji-picker" role="dialog" aria-label="이모티콘 선택기" hidden>
            <div class="tweet-modal__emoji-search">
              <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" class="tweet-modal__emoji-search-icon"><g><path d="M10.5 3.75c-3.728 0-6.75 3.022-6.75 6.75s3.022 6.75 6.75 6.75c1.55 0 2.977-.522 4.114-1.4l4.893 4.893 1.06-1.06-4.892-4.893a6.714 6.714 0 001.4-4.114c0-3.728-3.022-6.75-6.75-6.75zm-5.25 6.75c0-2.9 2.35-5.25 5.25-5.25s5.25 2.35 5.25 5.25-2.35 5.25-5.25 5.25-5.25-2.35-5.25-5.25z"></path></g></svg>
              <input type="search" class="tweet-modal__emoji-search-input" data-testid="emojiSearchInput" placeholder="이모티콘 검색하기" aria-label="이모티콘 검색하기" />
            </div>
            <div class="tweet-modal__emoji-tabs" role="tablist" aria-label="이모지 카테고리">
              <button type="button" class="tweet-modal__emoji-tab tweet-modal__emoji-tab--active" data-emoji-category="recent" role="tab" aria-selected="true" aria-label="최근"></button>
              <button type="button" class="tweet-modal__emoji-tab" data-emoji-category="smileys" role="tab" aria-selected="false" aria-label="스마일리 및 사람"></button>
              <button type="button" class="tweet-modal__emoji-tab" data-emoji-category="animals" role="tab" aria-selected="false" aria-label="동물 및 자연"></button>
              <button type="button" class="tweet-modal__emoji-tab" data-emoji-category="food" role="tab" aria-selected="false" aria-label="음식 및 음료"></button>
              <button type="button" class="tweet-modal__emoji-tab" data-emoji-category="activities" role="tab" aria-selected="false" aria-label="활동"></button>
              <button type="button" class="tweet-modal__emoji-tab" data-emoji-category="travel" role="tab" aria-selected="false" aria-label="여행 및 장소"></button>
              <button type="button" class="tweet-modal__emoji-tab" data-emoji-category="objects" role="tab" aria-selected="false" aria-label="사물"></button>
              <button type="button" class="tweet-modal__emoji-tab" data-emoji-category="symbols" role="tab" aria-selected="false" aria-label="기호"></button>
              <button type="button" class="tweet-modal__emoji-tab" data-emoji-category="flags" role="tab" aria-selected="false" aria-label="깃발"></button>
            </div>
            <div class="tweet-modal__emoji-content" data-testid="emojiPickerContent"></div>
          </div>
          <div class="composerActions">
            <div class="composerGauge" id="replyGauge" role="progressbar" aria-label="글자 수 진행률" aria-valuemin="0" aria-valuemax="500" aria-valuenow="0">
              <span class="composerGaugeText" id="replyGaugeText">500</span>
            </div>
            <button type="button" class="tweet-modal__submit" data-testid="tweetButton" disabled>답글</button>
          </div>
        </div>
      </div>
    </div><!-- /.tweet-modal__compose-view -->

    <!-- 위치 선택 서브뷰 -->
    <div class="tweet-modal__location-view" hidden>
      <div class="tweet-modal__location-modal" role="dialog" aria-modal="true" aria-labelledby="location-modal-title">
        <div class="tweet-modal__location-header">
          <button type="button" class="tweet-modal__location-close" aria-label="닫기" data-testid="location-back">
            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><g><path d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"></path></g></svg>
          </button>
          <h2 id="location-modal-title" class="tweet-modal__location-title">위치 태그하기</h2>
          <div class="tweet-modal__location-actions">
            <button type="button" class="tweet-modal__location-action tweet-modal__location-action--ghost" data-location-delete hidden>삭제</button>
            <button type="button" class="tweet-modal__location-action tweet-modal__location-action--solid" data-location-complete disabled>완료</button>
          </div>
        </div>
        <div class="tweet-modal__location-search">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" class="tweet-modal__location-search-icon"><g><path d="M10.5 3.75c-3.728 0-6.75 3.022-6.75 6.75s3.022 6.75 6.75 6.75c1.55 0 2.977-.522 4.114-1.4l4.893 4.893 1.06-1.06-4.892-4.893a6.714 6.714 0 001.4-4.114c0-3.728-3.022-6.75-6.75-6.75zm-5.25 6.75c0-2.9 2.35-5.25 5.25-5.25s5.25 2.35 5.25 5.25-2.35 5.25-5.25 5.25-5.25-2.35-5.25-5.25z"></path></g></svg>
          <input type="search" class="tweet-modal__location-search-input" data-location-search placeholder="위치 검색" aria-label="위치 검색" />
        </div>
        <div class="tweet-modal__location-list" role="menu" data-location-list>
          <button type="button" class="tweet-modal__location-item" role="menuitem"><span class="tweet-modal__location-item-label">대한민국 서초구</span><span class="tweet-modal__location-item-check"></span></button>
          <button type="button" class="tweet-modal__location-item" role="menuitem"><span class="tweet-modal__location-item-label">대한민국 강남구</span><span class="tweet-modal__location-item-check"></span></button>
          <button type="button" class="tweet-modal__location-item" role="menuitem"><span class="tweet-modal__location-item-label">대한민국 송파구</span><span class="tweet-modal__location-item-check"></span></button>
          <button type="button" class="tweet-modal__location-item" role="menuitem"><span class="tweet-modal__location-item-label">대한민국 광진구</span><span class="tweet-modal__location-item-check"></span></button>
          <button type="button" class="tweet-modal__location-item" role="menuitem"><span class="tweet-modal__location-item-label">대한민국 동작구</span><span class="tweet-modal__location-item-check"></span></button>
          <button type="button" class="tweet-modal__location-item" role="menuitem"><span class="tweet-modal__location-item-label">대한민국 중구</span><span class="tweet-modal__location-item-check"></span></button>
        </div>
      </div>
    </div><!-- /.tweet-modal__location-view -->

    <!-- 사용자 태그 서브뷰 -->
    <div class="tweet-modal__tag-view" hidden>
      <div class="tweet-modal__tag-modal" role="dialog" aria-modal="true" aria-labelledby="tag-modal-title">
        <div class="tweet-modal__tag-header">
          <button type="button" class="tweet-modal__tag-close" aria-label="닫기" data-testid="tag-back">
            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><g><path d="M10.59 12 4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"></path></g></svg>
          </button>
          <h2 id="tag-modal-title" class="tweet-modal__tag-title">사용자 태그하기</h2>
          <div class="tweet-modal__tag-actions">
            <button type="button" class="tweet-modal__tag-action" data-tag-complete>완료</button>
          </div>
        </div>
        <div class="tweet-modal__tag-search">
          <form role="search" class="tweet-modal__tag-search-form" data-tag-search-form>
            <div class="tweet-modal__tag-search-shell">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" class="tweet-modal__tag-search-icon"><g><path d="M10.25 3.75c-3.59 0-6.5 2.91-6.5 6.5s2.91 6.5 6.5 6.5c1.795 0 3.419-.726 4.596-1.904 1.178-1.177 1.904-2.801 1.904-4.596 0-3.59-2.91-6.5-6.5-6.5zm-8.5 6.5c0-4.694 3.806-8.5 8.5-8.5s8.5 3.806 8.5 8.5c0 1.986-.682 3.815-1.814 5.262l4.276 4.276-1.414 1.414-4.276-4.276A8.466 8.466 0 0110.25 18.75c-4.694 0-8.5-3.806-8.5-8.5z"></path></g></svg>
              <div class="tweet-modal__tag-chip-list" data-tag-chip-list></div>
              <input type="text" class="tweet-modal__tag-search-input" data-tag-search data-testid="searchPeople" placeholder="사용자 검색" aria-label="사용자 검색" role="combobox" aria-expanded="false" autocomplete="off" />
            </div>
            <div class="tweet-modal__tag-results" data-tag-results></div>
          </form>
        </div>
      </div>
    </div><!-- /.tweet-modal__tag-view -->

    <!-- 미디어 설명 서브뷰 -->
    <div class="tweet-modal__media-view" hidden>
      <div class="tweet-modal__media-editor" role="dialog" aria-modal="true" aria-labelledby="media-editor-title">
        <div class="tweet-modal__media-header">
          <button type="button" class="tweet-modal__media-header-btn tweet-modal__media-header-btn--ghost" data-testid="media-back" aria-label="돌아가기">
            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><g><path d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"></path></g></svg>
          </button>
          <h2 id="media-editor-title" class="tweet-modal__media-title" data-media-title>이미지 설명 수정</h2>
          <div class="tweet-modal__media-header-actions">
            <button type="button" class="tweet-modal__media-header-btn" data-media-prev aria-label="이전 이미지">이전</button>
            <button type="button" class="tweet-modal__media-header-btn" data-media-next aria-label="다음 이미지">다음</button>
            <button type="button" class="tweet-modal__media-header-btn tweet-modal__media-header-btn--solid" data-media-save>저장</button>
          </div>
        </div>
        <div class="tweet-modal__media-body">
          <section class="tweet-modal__media-panel tweet-modal__media-panel--active">
            <div class="tweet-modal__media-alt-preview">
              <img src="" alt="" class="tweet-modal__media-preview-image tweet-modal__media-preview-image--alt" data-media-preview-image />
            </div>
            <label class="tweet-modal__media-alt-field" aria-label="대체 텍스트">
              <div class="tweet-modal__media-alt-meta">
                <span class="tweet-modal__media-alt-label">설명</span>
                <span class="tweet-modal__media-alt-count" data-media-alt-count>0 / 1,000</span>
              </div>
              <textarea class="tweet-modal__media-alt-input" data-media-alt-input maxlength="1000"></textarea>
            </label>
          </section>
        </div>
      </div>
    </div><!-- /.tweet-modal__media-view -->

    <!-- 임시저장 서브뷰 -->
    <div class="tweet-modal__draft-view" hidden>
      <div class="draft-panel__header">
        <button type="button" class="draft-panel__back" aria-label="돌아가기">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><g><path d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"></path></g></svg>
        </button>
        <h2 class="draft-panel__title">임시저장</h2>
        <button type="button" class="draft-panel__action">수정</button>
      </div>
      <div class="draft-panel__tablist" aria-label="초안 탭">
        <div class="draft-panel__tab draft-panel__tab--active draft-panel__tab--single">임시저장</div>
      </div>
      <div class="draft-panel__content">
        <div class="draft-panel__list">
          <button type="button" class="draft-panel__item" aria-pressed="false">
            <img class="draft-panel__avatar" alt="" src="https://pbs.twimg.com/profile_images/2029361845321207808/LltLeaLS_bigger.jpg" />
            <span class="draft-panel__item-body">
              <span class="draft-panel__meta">@tmtsugar 님에게 보내는 답글</span>
              <span class="draft-panel__text">프로필 문구 수정 전 확인 부탁드립니다.</span>
              <span class="draft-panel__date">3월 10일 오전 11:20</span>
            </span>
          </button>
          <button type="button" class="draft-panel__item" aria-pressed="false">
            <img class="draft-panel__avatar" alt="" src="https://pbs.twimg.com/profile_images/2029093315963158528/9_GGpfuL_bigger.png" />
            <span class="draft-panel__item-body">
              <span class="draft-panel__meta">@elonmusk 님에게 보내는 답글</span>
              <span class="draft-panel__text">회의 끝나고 초안 정리해서 다시 보낼게요.</span>
              <span class="draft-panel__date">3월 9일 오후 7:10</span>
            </span>
          </button>
        </div>
        <div class="draft-panel__empty" hidden>
          <p class="draft-panel__empty-title">잠시 생각을 정리합니다</p>
          <p class="draft-panel__empty-body">아직 게시할 준비가 되지 않았나요? 임시저장해 두고 나중에 이어서 작성하세요.</p>
        </div>
      </div>
      <div class="draft-panel__footer" hidden>
        <button type="button" class="draft-panel__footer-link draft-panel__select-all">모두 선택</button>
        <button type="button" class="draft-panel__footer-delete" disabled>삭제하기</button>
      </div>
      <div class="draft-panel__confirm-overlay" hidden>
        <div class="draft-panel__confirm-backdrop"></div>
        <div class="draft-panel__confirm-card" role="alertdialog" aria-modal="true" aria-labelledby="draft-confirm-title" aria-describedby="draft-confirm-desc">
          <h3 id="draft-confirm-title" class="draft-panel__confirm-title">전송하지 않은 게시물 삭제하기</h3>
          <p id="draft-confirm-desc" class="draft-panel__confirm-desc">이 작업은 취소할 수 없으며 선택한 전송하지 않은 게시물이 삭제됩니다.</p>
          <div class="draft-panel__confirm-actions">
            <button type="button" class="draft-panel__confirm-primary">삭제하기</button>
            <button type="button" class="draft-panel__confirm-secondary">취소</button>
          </div>
        </div>
      </div>
    </div><!-- /.tweet-modal__draft-view -->

    <!-- 판매글 선택 서브뷰 -->
    <div class="tweet-modal__product-view" data-product-select-modal hidden>
      <div class="draft-panel__header">
        <button type="button" class="draft-panel__back" data-product-select-close aria-label="돌아가기">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><g><path d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"></path></g></svg>
        </button>
        <h2 class="draft-panel__title">판매글 선택하기</h2>
        <button type="button" class="draft-panel__action" data-product-select-complete disabled>완료</button>
      </div>
      <div class="draft-panel__content">
        <div class="draft-panel__list" data-product-select-list></div>
        <div class="draft-panel__empty" data-product-empty hidden>
          <p class="draft-panel__empty-title">등록된 상품이 없습니다</p>
          <p class="draft-panel__empty-body">마이페이지에서 상품을 먼저 등록해 주세요.</p>
        </div>
      </div>
    </div><!-- /.tweet-modal__product-view -->
  </div><!-- /.tweet-modal -->
</div><!-- /.tweet-modal-overlay -->

</body>
</html>
