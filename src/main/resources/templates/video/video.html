<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Video Modal</title>
    <link rel="stylesheet" href="/static/css/video/video.css"/>
</head>
<body>
<main class="video-page">
    <section class="space-modal" aria-label="스페이스 모달">
        <header class="space-header">
            <button class="icon-btn icon-down" type="button" aria-label="접기">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 8.5l7 7 7-7"/>
                </svg>
            </button>

            <div class="header-actions">
                <button class="icon-btn play-btn" type="button" aria-label="재생">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M8 6l10 6-10 6z"/>
                    </svg>
                </button>
                <button class="icon-btn stop-btn" type="button" aria-label="정지">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="7" y="7" width="10" height="10" rx="1.8"/>
                    </svg>
                </button>
                <button class="end-btn" type="button">종료</button>
            </div>
        </header>

        <section class="space-body">
            <h1 class="space-title">박하민의 스페이스</h1>
            <button class="icon-btn edit-btn" type="button" aria-label="수정">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 16.5V20h3.5L18 9.5 14.5 6 4 16.5z"/>
                    <path d="M13.5 7l3.5 3.5"/>
                </svg>
            </button>

            <div class="host-profile">
                <div class="host-avatar" aria-label="박하민 프로필"></div>
                <div class="host-meta">
                    <p class="host-name">박하민</p>

                </div>
            </div>
        </section>

        <footer class="space-footer">
            <div class="footer-left">
                <button class="icon-btn small-up" type="button" aria-label="올리기">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M6 15l6-6 6 6"/>
                    </svg>
                </button>
            </div>

            <div class="footer-right">
                <button class="circle-btn" type="button" aria-label="참여자">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="8" cy="9" r="3"/>
                        <circle cx="16" cy="9" r="3"/>
                        <path d="M3 20c0-3 2-5 5-5s5 2 5 5"/>
                        <path d="M11 20c0-3 2-5 5-5s5 2 5 5"/>
                    </svg>
                </button>
            </div>
        </footer>
    </section>
</main>
<script src="/static/js/video/video.js"></script>
`r`n
</body>
</html>
