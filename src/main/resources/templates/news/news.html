<!DOCTYPE html>
<html lang="ko" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/common/layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/news/news.css">
    <link rel="stylesheet" href="/css/post-detailed/post-detailed.css">
    <title>news-detail</title>
    <script th:inline="javascript">
        window.newsId = /*[[${news.id}]]*/ null;
        window.memberId = /*[[${memberId}]]*/ null;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@joeattardi/emoji-button@3.0.3/dist/index.min.js"></script>
    <script src="/js/utils/exchange.js"></script>
</head>
<body>
<th:block layout:fragment="content">
<div class="news-page">
    <main class="news-shell">
        <header class="news-header">
            <button type="button" class="news-header-back" id="newsBackButton" aria-label="뒤로 가기">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <g>
                        <path d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"></path>
                    </g>
                </svg>
            </button>
            <h1 class="news-header-title">뉴스</h1>
        </header>

        <section class="trend-title">
            <h1 th:text="${news != null ? news.newsTitle : ''}">뉴스 제목</h1>
            <div class="trend-meta">
                <span th:if="${news != null and news.newsType != null and news.newsType.value == 'emergency'}"
                      class="trend-meta-badge trend-meta-badge--emergency">속보</span>
                <span th:if="${news != null and news.newsType != null and news.newsType.value != 'emergency'}"
                      class="trend-meta-badge trend-meta-badge--general">일반</span>
                <span th:if="${news != null and news.newsCategory != null}"
                      class="trend-meta-category"
                      th:text="${news.newsCategory.label}">category</span>
                <span class="trend-meta-time" th:text="${createdRelative}">방금 전</span>
            </div>
        </section>

        <p class="ai-summary" th:text="${news != null ? news.newsContent : ''}">뉴스 내용</p>
        <p class="ai-disclaimer">이 게시물은 Xport AI에서 요약한 내용입니다. AI는 실수할 수 있습니다.</p>
        <div class="news-source-row" th:if="${news != null and news.newsSourceUrl != null and !#strings.isEmpty(news.newsSourceUrl)}">
            <a class="news-source-chip" th:href="${news.newsSourceUrl}" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M11.96 14.945a4.49 4.49 0 0 0 3.296-1.32 4.49 4.49 0 0 0 0-6.366l-2.64-2.64a4.49 4.49 0 0 0-6.367 0 4.49 4.49 0 0 0 0 6.367l1.06 1.06 1.415-1.414-1.06-1.06a2.49 2.49 0 0 1 0-3.54 2.49 2.49 0 0 1 3.538 0l2.64 2.64a2.49 2.49 0 0 1 0 3.54 2.49 2.49 0 0 1-1.882.732zm-1.92-5.89a4.49 4.49 0 0 0-3.296 1.32 4.49 4.49 0 0 0 0 6.366l2.64 2.64a4.49 4.49 0 0 0 6.367 0 4.49 4.49 0 0 0 0-6.366l-1.06-1.06-1.415 1.414 1.06 1.06a2.49 2.49 0 0 1 0 3.54 2.49 2.49 0 0 1-3.538 0l-2.64-2.64a2.49 2.49 0 0 1 0-3.54 2.49 2.49 0 0 1 1.882-.732z"></path>
                </svg>
                <span>원문 보기</span>
            </a>
        </div>

        <div class="post-detail-actions tweet-action-bar" th:attr="data-news-id=${news != null ? news.id : ''}">
            <div class="post-detail-action-slot">
                <button class="post-detail-action-button tweet-action-btn" type="button"
                        data-testid="reply" th:attr="aria-label='답글 ' + ${replyCount}">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M1.751 10c0-4.42 3.584-8 8.005-8h4.366c4.49 0 8.129 3.64 8.129 8.13 0 2.96-1.607 5.68-4.196 7.11l-8.054 4.46v-3.69h-.067c-4.49.1-8.183-3.51-8.183-8.01zm8.005-6c-3.317 0-6.005 2.69-6.005 6 0 3.37 2.77 6.08 6.138 6.01l.351-.01h1.761v2.3l5.087-2.81c1.951-1.08 3.163-3.13 3.163-5.36 0-3.39-2.744-6.13-6.129-6.13H9.756z"></path>
                    </svg>
                    <span class="tweet-action-count" th:text="${replyCount}">0</span>
                </button>
            </div>
            <div class="post-detail-action-slot">
                <button class="post-detail-action-button post-detail-action-button-like tweet-action-btn tweet-action-btn-like tweet-action-btn--like"
                        th:classappend="${liked} ? ' active' : ''"
                        type="button" th:attr="aria-label='마음 ' + ${likeCount}">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path data-path-inactive="M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91zm4.187 7.69c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z"
                              data-path-active="M20.884 13.19c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z"
                              th:attr="d=${liked} ? 'M20.884 13.19c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z' : 'M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91zm4.187 7.69c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z'"></path>
                    </svg>
                    <span class="tweet-action-count" th:text="${likeCount}">0</span>
                </button>
            </div>
            <div class="post-detail-action-slot">
                <button class="post-detail-action-button post-detail-action-button-bookmark tweet-action-btn tweet-action-btn-bookmark tweet-action-btn--bookmark"
                        th:classappend="${bookmarked} ? ' active' : ''"
                        type="button" aria-label="북마크">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path data-path-inactive="M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5zM6.5 4c-.276 0-.5.22-.5.5v14.56l6-4.29 6 4.29V4.5c0-.28-.224-.5-.5-.5h-11z"
                              data-path-active="M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5z"
                              th:attr="d=${bookmarked} ? 'M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5z' : 'M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5zM6.5 4c-.276 0-.5.22-.5.5v14.56l6-4.29 6 4.29V4.5c0-.28-.224-.5-.5-.5h-11z'"></path>
                    </svg>
                </button>
            </div>
            <div class="post-detail-action-slot">
                <button class="post-detail-action-button tweet-action-btn tweet-action-btn-share tweet-action-btn--share"
                        type="button" aria-label="게시물 공유하기" aria-haspopup="menu" aria-expanded="false">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 2.59l5.7 5.7-1.41 1.42L13 6.41V16h-2V6.41l-3.3 3.3-1.41-1.42L12 2.59zM21 15l-.02 3.51c0 1.38-1.12 2.49-2.5 2.49H5.5C4.11 21 3 19.88 3 18.5V15h2v3.5c0 .28.22.5.5.5h12.98c.28 0 .5-.22.5-.5L19 15h2z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <section class="post-detail-reply-box">
            <div class="post-detail-inline-reply">
                <div class="post-detail-inline-reply-card tweet-modal__composer">
                    <div class="tweet-modal__input-wrap">
                        <div class="post-detail-inline-reply-editor tweet-modal__editor"
                             contenteditable="true"
                             role="textbox"
                             aria-label="답글 작성"
                             aria-multiline="true"
                             tabindex="0"
                             data-placeholder="답글 게시하기"></div>
                    </div>
                    <div class="composerActions">
                        <div class="composerGauge" data-reply-gauge role="progressbar"
                             aria-label="글자 수 진행률" aria-valuemin="0" aria-valuemax="500" aria-valuenow="0">
                            <span class="composerGaugeText" data-reply-gauge-text></span>
                        </div>
                        <button type="button" class="tweet-modal__submit" data-reply-submit disabled>답글</button>
                    </div>
                </div>
            </div>
        </section>

        <div class="post-detail-sort">
            <button class="post-detail-sort-button" type="button" aria-expanded="false" data-sort="latest">
                <span>최신순</span>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3.543 8.96l1.414-1.42L12 14.59l7.043-7.05 1.414 1.42L12 17.41 3.543 8.96z"></path>
                </svg>
            </button>
            <div class="post-detail-sort-menu dropdown-menu" hidden>
                <button class="dropdown-item" type="button" data-sort="latest">최신순</button>
                <button class="dropdown-item" type="button" data-sort="popular">인기순</button>
            </div>
        </div>

        <section class="post-detail-replies" id="newsReplies" aria-label="답글 목록"></section>

        <div class="news-toast" id="newsToast" role="status" aria-live="polite" hidden></div>
    </main>
</div>
<script src="/js/news/news-detail.js"></script>
</th:block>
</body>
</html>
